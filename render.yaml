services:
  - type: web
    name: smartroute
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENCAGE_API_KEY
        sync: false
      - key: OWM_API_KEY
        sync: false
